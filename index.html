<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Horari SMX2</title>

<style>
table{
    width: 100%; /* Amplada total de la pàgina */
    border: 1px solid black; /* Vora negra */
    border-collapse: collapse; /* Uneix les vores */
    text-align: center; /* Centra el text */
}

/*Estils de totes les cel·ldes*/

th, td{
    border: 1px solid black; 
 /*Vora negra a cada cel·la*/
}

.soRed{ background-color: #f8d7da; }
.pjsis{ background-color: #d4edda; }
.angles{ background-color: #d1ecf1; }
.web{ background-color: #fff3cd; }
.seguretat{ background-color: #e2d6f3; }
.serveis{ background-color: #f5c6cb; }
.sostenibilitat{ background-color: #ffeeba; }
.pati{ background-color: #cccccc; }
</style>

</head>
<body>

<!-- <table> Defineix una taula -->
<table>

<!-- <caption> Afegeix un títol a la taula -->
<caption><strong>Horari SMX2 (tarda)</strong></caption>

<!-- <tr> Defineix una fila -->
<tr>
    <!-- <th> Defineix una cel·la d'encapçalament -->
    <th>Hora</th>
    <th>Dilluns</th>
    <th>Dimarts</th>
    <th>Dimecres</th>
    <th>Dijous</th>
    <th>Divendres</th>
</tr>

<tr>
    <td>15:00-15:55</td>
    <!-- <td> Defineix una cel·la normal -->
    <!-- rowspan Uneix files verticalment -->
    <td class="soRed" rowspan="2">S.O.Red</td>
    <td class="soRed" rowspan="2">S.O.Red</td>
    <td></td>
    <td class="angles" rowspan="2">Anglès</td>
    <td class="web" rowspan="2">PJ Web</td>
</tr>

<tr>
    <td>15:55-16:50</td>
    <td></td>
</tr>

<tr>
    <td>16:50-17:45</td>
    <td class="pjsis" rowspan="2">PJ Sistemes</td>
    <td class="pjsis">PJ Sistemes</td>
    <td>Tutoria</td>
    <td class="seguretat" rowspan="2">Seguretat</td>
    <td class="sostenibilitat">Sostenibilitat</td>
</tr>

<tr>
    <td>17:45-18:40</td>
    <td class="seguretat">Seguretat</td>
    <td class="web" rowspan="2">Web</td>
</tr>

<tr>
    <td>18:40-19:10</td>
    <td class="pati" colspan="5">PATI</td>
</tr>

<tr>
    <td>19:10-20:05</td>
    <td></td>
    <td class="serveis" rowspan="2">Serveis</td>
    <td class="web" rowspan="2">Web</td>
    <td class="serveis" rowspan="2">Serveis</td>
    <td></td>
</tr>

<tr>
    <td>20:05-21:00</td>
    <td></td>
    <td></td>
</tr>

</table>

</body>
</html>
